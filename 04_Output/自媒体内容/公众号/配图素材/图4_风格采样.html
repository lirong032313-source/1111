<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1800, height=1000">
<title>风格采样 · 让AI学会你的声音</title>
<style>
  * { margin:0; padding:0; box-sizing: border-box; }
  body {
    width: 1800px;
    height: 1000px;
    background: linear-gradient(135deg, #0D1B2A 0%, #1A1A2E 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    gap: 50px;
    padding: 60px 100px;
  }
  .title {
    font-size: 52px;
    font-weight: 700;
    color: #FFF5E1;
    letter-spacing: 6px;
    text-shadow: 0 0 30px rgba(255,0,255,0.3);
  }
  .subtitle {
    font-size: 28px;
    color: #A0A0A0;
    margin-top: -20px;
  }
  .main {
    display: flex;
    gap: 50px;
    align-items: center;
    width: 100%;
    justify-content: center;
  }
  .brain {
    width: 380px;
    height: 380px;
    border-radius: 50%;
    background: rgba(255,0,255,0.08);
    border: 2px solid rgba(255,0,255,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 120px;
    position: relative;
    box-shadow: 0 0 60px rgba(255,0,255,0.15);
  }
  .fragments {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .frag {
    border-radius: 12px;
    padding: 20px 28px;
    font-size: 22px;
    line-height: 1.6;
    color: #E0E0E0;
    max-width: 520px;
    position: relative;
  }
  .frag:nth-child(1) {
    background: rgba(0,255,255,0.1);
    border-left: 4px solid #00FFFF;
  }
  .frag:nth-child(2) {
    background: rgba(255,215,0,0.1);
    border-left: 4px solid #FFD700;
  }
  .frag:nth-child(3) {
    background: rgba(255,0,255,0.1);
    border-left: 4px solid #FF00FF;
  }
  .frag-type {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .frag:nth-child(1) .frag-type { color: #00FFFF; }
  .frag:nth-child(2) .frag-type { color: #FFD700; }
  .frag:nth-child(3) .frag-type { color: #FF00FF; }

  .arrow {
    font-size: 72px;
    color: #FFD700;
    text-shadow: 0 0 30px rgba(255,215,0,0.4);
    flex-shrink: 0;
  }
  .number-highlight {
    font-size: 96px;
    font-weight: 900;
    color: #FFD700;
    text-shadow: 0 0 40px rgba(255,215,0,0.5);
    line-height: 1;
  }
  .number-label {
    font-size: 26px;
    color: #C0C0C0;
    margin-top: 8px;
  }
  .types {
    display: flex;
    gap: 30px;
    margin-top: 10px;
  }
  .type-badge {
    border-radius: 10px;
    padding: 14px 24px;
    font-size: 24px;
    font-weight: 700;
  }
  .type-1 { background: rgba(0,255,255,0.15); color: #00FFFF; border: 1px solid rgba(0,255,255,0.3); }
  .type-2 { background: rgba(255,215,0,0.15); color: #FFD700; border: 1px solid rgba(255,215,0,0.3); }
  .type-3 { background: rgba(255,0,255,0.15); color: #FF00FF; border: 1px solid rgba(255,0,255,0.3); }
</style>
</head>
<body>
  <div class="title">🎙️ 风格采样 · 让 AI 学会"你的声音"</div>
  <div class="subtitle">从你自己写过的文字里，挑出最像自己的段落，喂给 AI</div>

  <div class="main">
    <!-- 左侧：大脑图标 -->
    <div class="brain">🧠</div>

    <!-- 中间：箭头 -->
    <div class="arrow">→</div>

    <!-- 右侧：段落示例 -->
    <div class="fragments">
      <div class="frag">
        <div class="frag-type">📌 观点型 · 你独特的判断</div>
        "AI工具最大的误区，是以为装上了就能用。其实装上去只是开始，真正有用的是——让它读懂你。"
      </div>
      <div class="frag">
        <div class="frag-type">📖 故事型 · 你的真实经历</div>
        "32岁那年，我做了个很叛逆的决定：不升职了，去搞副业。身边人都觉得我疯了，但只有我知道——那个轨道已经待不下去了。"
      </div>
      <div class="frag">
        <div class="frag-type">💬 对话型 · 你和读者的说话方式</div>
        "你有没有过这种感觉？每天忙得要死，但回头一看，什么都没留下。不是你不够努力，是你的努力没有变成资产。"
      </div>
    </div>

    <div class="arrow">→</div>

    <!-- 右侧：结果 -->
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="number-highlight">38</div>
      <div class="number-label">个精选段落</div>
      <div class="types">
        <div class="type-badge type-1">观点型</div>
        <div class="type-badge type-2">故事型</div>
        <div class="type-badge type-3">对话型</div>
      </div>
    </div>
  </div>
</body>
</html>
