<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1800, height=1000">
<title>提示词 vs 契约书</title>
<style>
  * { margin:0; padding:0; box-sizing: border-box; }
  body {
    width: 1800px;
    height: 1000px;
    background: linear-gradient(135deg, #0D1B2A 0%, #1A1A2E 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    gap: 40px;
    padding: 60px;
  }
  .title {
    font-size: 52px;
    font-weight: 700;
    color: #FFF5E1;
    letter-spacing: 6px;
    text-shadow: 0 0 30px rgba(255,0,255,0.3);
  }
  .main {
    display: flex;
    gap: 60px;
    width: 100%;
    justify-content: center;
  }
  .card {
    width: 750px;
    border-radius: 20px;
    padding: 50px 45px;
    position: relative;
    overflow: hidden;
  }
  .card-left {
    background: rgba(120,50,255,0.12);
    border: 2px solid rgba(120,50,255,0.5);
  }
  .card-right {
    background: rgba(0,255,255,0.08);
    border: 2px solid rgba(0,255,255,0.5);
  }
  .card-title {
    font-size: 40px;
    font-weight: 700;
    margin-bottom: 30px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .card-left .card-title { color: #A855F7; }
  .card-right .card-title { color: #00FFFF; }
  .card-icon { font-size: 44px; }
  .divider {
    height: 2px;
    margin: 20px 0 30px;
  }
  .card-left .divider { background: linear-gradient(90deg, #A855F7, transparent); }
  .card-right .divider { background: linear-gradient(90deg, #00FFFF, transparent); }
  .item {
    font-size: 26px;
    color: #E0E0E0;
    line-height: 1.8;
    margin-bottom: 16px;
    padding-left: 28px;
    position: relative;
  }
  .item::before {
    content: '▸';
    position: absolute;
    left: 0;
    font-size: 22px;
  }
  .card-left .item::before { color: #A855F7; }
  .card-right .item::before { color: #00FFFF; }
  .item-label {
    font-weight: 700;
    font-size: 28px;
  }
  .card-left .item-label { color: #C084FC; }
  .card-right .item-label { color: #67E8F9; }
  .vs {
    font-size: 72px;
    font-weight: 900;
    color: #FFD700;
    text-shadow: 0 0 40px rgba(255,215,0,0.5);
    align-self: center;
    flex-shrink: 0;
  }
  .tag {
    display: inline-block;
    border-radius: 8px;
    padding: 8px 20px;
    font-size: 24px;
    font-weight: 700;
    margin-top: 20px;
  }
  .card-left .tag { background: rgba(168,85,247,0.25); color: #C084FC; }
  .card-right .tag { background: rgba(0,255,255,0.15); color: #67E8F9; }
</style>
</head>
<body>
  <div class="title">⚡ 提示词 &nbsp;&nbsp;vs&nbsp;&nbsp; 契约书（CLAUDE.md）</div>
  <div class="main">
    <!-- 左侧：提示词 -->
    <div class="card card-left">
      <div class="card-title"><span class="card-icon">⚡</span> 提示词</div>
      <div class="divider"></div>
      <div class="item"><span class="item-label">时效：</span>单次对话</div>
      <div class="item"><span class="item-label">目标：</span>写好这次回答</div>
      <div class="item"><span class="item-label">核心：</span>指令 / 命令</div>
      <div class="item"><span class="item-label">方式：</span>每次重写</div>
      <div class="item"><span class="item-label">本质：</span>你指挥 AI 干活</div>
      <div class="tag">📌 像"临时工"</div>
    </div>

    <div class="vs">VS</div>

    <!-- 右侧：契约书 -->
    <div class="card card-right">
      <div class="card-title"><span class="card-icon">🤝</span> 契约书（CLAUDE.md）</div>
      <div class="divider"></div>
      <div class="item"><span class="item-label">时效：</span>长期复用</div>
      <div class="item"><span class="item-label">目标：</span>让 AI 理解"你是谁"</div>
      <div class="item"><span class="item-label">核心：</span>身份 / 表达 / 边界</div>
      <div class="item"><span class="item-label">方式：</span>持续迭代生长</div>
      <div class="item"><span class="item-label">本质：</span>你和 AI 共同进化</div>
      <div class="tag">📌 像"合伙人"</div>
    </div>
  </div>
</body>
</html>
