<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1500" width="1080" height="1500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF6EE"/>
      <stop offset="55%" stop-color="#FFEFDC"/>
      <stop offset="100%" stop-color="#FFE3C2"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF8F0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E63946"/>
      <stop offset="50%" stop-color="#F4A261"/>
      <stop offset="100%" stop-color="#E63946"/>
    </linearGradient>
    <linearGradient id="lobsterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E63946"/>
      <stop offset="100%" stop-color="#C1121F"/>
    </linearGradient>
    <linearGradient id="ctaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF8B5C"/>
      <stop offset="100%" stop-color="#E63946"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1500" fill="url(#bgGrad)"/>

  <!-- Decorative dots -->
  <circle cx="120" cy="200" r="8" fill="#F4A261" opacity="0.45"/>
  <circle cx="980" cy="280" r="12" fill="#E63946" opacity="0.35"/>
  <circle cx="60" cy="900" r="14" fill="#F4A261" opacity="0.3"/>
  <circle cx="1020" cy="1100" r="10" fill="#E63946" opacity="0.4"/>
  <circle cx="940" cy="180" r="6" fill="#FF8B5C" opacity="0.5"/>
  <circle cx="80" cy="500" r="6" fill="#E63946" opacity="0.35"/>

  <!-- TOP TAG -->
  <g transform="translate(540, 110)">
    <rect x="-180" y="-26" width="360" height="52" rx="26" fill="#FFFFFF" stroke="#E63946" stroke-width="2"/>
    <text x="0" y="8" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="600" fill="#E63946" text-anchor="middle">蓉蓉子 · 5月限定 · 第三期实操营</text>
  </g>

  <!-- TITLE -->
  <text x="540" y="240" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="72" font-weight="800" fill="#2C3E50" text-anchor="middle" letter-spacing="2">领养你的小龙虾</text>

  <!-- Lobster emoji -->
  <text x="540" y="350" font-size="120" text-anchor="middle">🦞</text>

  <!-- SUBTITLE -->
  <text x="540" y="430" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="42" font-weight="700" fill="#E63946" text-anchor="middle" letter-spacing="3">21 天 · LLM Wiki × 六间房</text>
  <text x="540" y="486" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="500" fill="#7F4C2A" text-anchor="middle">让 AI 真正"懂你"，并替你工作</text>

  <!-- Divider -->
  <g transform="translate(540, 530)">
    <line x1="-100" y1="0" x2="-30" y2="0" stroke="#E63946" stroke-width="2"/>
    <text x="0" y="6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" fill="#E63946" text-anchor="middle">✨</text>
    <line x1="30" y1="0" x2="100" y2="0" stroke="#E63946" stroke-width="2"/>
  </g>

  <!-- 3 STATS -->
  <g transform="translate(540, 605)">
    <g transform="translate(-300, 0)">
      <text x="0" y="0" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="58" font-weight="800" fill="#E63946" text-anchor="middle">21</text>
      <text x="0" y="36" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" fill="#7F4C2A" text-anchor="middle">天陪跑</text>
    </g>
    <g transform="translate(0, 0)">
      <text x="0" y="0" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="58" font-weight="800" fill="#E63946" text-anchor="middle">3</text>
      <text x="0" y="36" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" fill="#7F4C2A" text-anchor="middle">次直播</text>
    </g>
    <g transform="translate(300, 0)">
      <text x="0" y="0" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="58" font-weight="800" fill="#E63946" text-anchor="middle">1🦞</text>
      <text x="0" y="36" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" fill="#7F4C2A" text-anchor="middle">你的数字员工</text>
    </g>
  </g>

  <!-- 3 PHASES CARDS -->
  <g transform="translate(540, 720)">
    <text x="0" y="0" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="26" font-weight="700" fill="#2C3E50" text-anchor="middle">3 次直播 · 3 个里程碑</text>
  </g>

  <!-- Phase 1 Card -->
  <g transform="translate(60, 770)" filter="url(#softShadow)">
    <rect width="960" height="135" rx="20" fill="url(#cardGrad)"/>
    <circle cx="70" cy="68" r="38" fill="#FFE3C2"/>
    <text x="70" y="82" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="40" font-weight="800" fill="#E63946" text-anchor="middle">①</text>
    <text x="135" y="56" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="26" font-weight="700" fill="#2C3E50">直播 1 · 搭知识库底座</text>
    <text x="135" y="92" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" fill="#7F4C2A">认知三层架构 · 现场建目录 · 跑通你的第一个 MVP</text>
    <text x="135" y="120" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-style="italic" fill="#E63946">📍 Karpathy LLM Wiki × 六间房联动</text>
  </g>

  <!-- Phase 2 Card -->
  <g transform="translate(60, 925)" filter="url(#softShadow)">
    <rect width="960" height="135" rx="20" fill="url(#cardGrad)"/>
    <circle cx="70" cy="68" r="38" fill="#FFE3C2"/>
    <text x="70" y="82" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="40" font-weight="800" fill="#E63946" text-anchor="middle">②</text>
    <text x="135" y="56" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="26" font-weight="700" fill="#2C3E50">直播 2 · 领养你的小龙虾🦞</text>
    <text x="135" y="92" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" fill="#7F4C2A">微信 ClawBot · WorkBuddy · 自动运转的知识库</text>
    <text x="135" y="120" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-style="italic" fill="#E63946">📍 收到第一份 AI 日报 + 每日工作汇总</text>
  </g>

  <!-- Phase 3 Card -->
  <g transform="translate(60, 1080)" filter="url(#softShadow)">
    <rect width="960" height="135" rx="20" fill="url(#cardGrad)"/>
    <circle cx="70" cy="68" r="38" fill="#FFE3C2"/>
    <text x="70" y="82" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="40" font-weight="800" fill="#E63946" text-anchor="middle">③</text>
    <text x="135" y="56" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="26" font-weight="700" fill="#2C3E50">直播 3 · 打造你的数字员工</text>
    <text x="135" y="92" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" fill="#7F4C2A">微信发想法 → 自动生成小红书图文 + 公众号草稿</text>
    <text x="135" y="120" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-style="italic" fill="#E63946">📍 跑通"碎片→双平台"完整内容工厂</text>
  </g>

  <!-- VALUE PROMISE -->
  <g transform="translate(540, 1265)">
    <rect x="-440" y="-40" width="880" height="78" rx="14" fill="#2C3E50"/>
    <text x="0" y="-6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="500" fill="#FFE3C2" text-anchor="middle">21 天后你拥有的不是又一个收藏夹，</text>
    <text x="0" y="26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">而是一只 · 会自己长大的 · AI 助手 🦞</text>
  </g>

  <!-- DATE BLOCK -->
  <g transform="translate(540, 1370)">
    <rect x="-320" y="-32" width="640" height="62" rx="12" fill="#FFFFFF" stroke="#E63946" stroke-width="2.5"/>
    <text x="-265" y="6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="600" fill="#E63946">📅 5月10日开营</text>
    <line x1="0" y1="-18" x2="0" y2="22" stroke="#E63946" stroke-width="1.5" opacity="0.4"/>
    <text x="40" y="6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="600" fill="#E63946">⏰ 5月5日截止报名</text>
  </g>

  <!-- CTA -->
  <g transform="translate(540, 1450)">
    <rect x="-180" y="-26" width="360" height="52" rx="26" fill="url(#ctaGrad)"/>
    <text x="0" y="8" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">私信「实操营」 · 锁定名额 →</text>
  </g>
</svg>
